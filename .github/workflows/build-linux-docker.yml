name: Build Linux Docker Images

on:
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ldqs365/qq-farm-automation-bot

jobs:
  prepare-tags:
    name: Prepare shared tags
    runs-on: ubuntu-latest
    outputs:
      release_date: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release date tag from Update.log first line
        id: tag
        run: |
          first_line="$(sed -n '1p' Update.log | tr -d '\r')"
          date_raw="$(echo "$first_line" | grep -oE '[0-9]{4}/[0-9]{2}/[0-9]{2}' | head -n 1)"

          if [ -z "$date_raw" ]; then
            echo "Could not find date like YYYY/MM/DD in Update.log line 1"
            exit 1
          fi

          # Docker tags cannot contain '/'; convert to YYYY-MM-DD.
          date_tag="${date_raw//\//-}"
          echo "value=$date_tag" >> "$GITHUB_OUTPUT"

  docker-amd64:
    name: Build Docker linux/amd64
    runs-on: ubuntu-latest
    needs: prepare-tags
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./core/Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export amd64 digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" | sed 's/^sha256://' > /tmp/digests/amd64

      - name: Upload amd64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-amd64
          path: /tmp/digests/amd64
          if-no-files-found: error
          retention-days: 1

  docker-arm64:
    name: Build Docker linux/arm64
    runs-on: ubuntu-24.04-arm
    needs: prepare-tags
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./core/Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export arm64 digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" | sed 's/^sha256://' > /tmp/digests/arm64

      - name: Upload arm64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-arm64
          path: /tmp/digests/arm64
          if-no-files-found: error
          retention-days: 1

  docker-armv7:
    name: Build Docker linux/arm/v7
    runs-on: ubuntu-latest
    needs: prepare-tags
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./core/Dockerfile
          platforms: linux/arm/v7
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export armv7 digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" | sed 's/^sha256://' > /tmp/digests/armv7

      - name: Upload armv7 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-armv7
          path: /tmp/digests/armv7
          if-no-files-found: error
          retention-days: 1

  publish-manifests:
    name: Publish Docker manifests (Linux)
    runs-on: ubuntu-latest
    needs:
      - prepare-tags
      - docker-amd64
      - docker-arm64
      - docker-armv7
    permissions:
      contents: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Publish latest and release-date manifests from digests
        run: |
          sources=""
          for f in /tmp/digests/*; do
            d="sha256:$(cat "$f")"
            sources="$sources ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$d"
          done

          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-tags.outputs.release_date }} \
            $sources

      - name: Inspect latest manifest
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Inspect release-date manifest
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-tags.outputs.release_date }}
