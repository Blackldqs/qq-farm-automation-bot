name: Sync upstream every 6 hours and build Docker

on:
  schedule:
    # 每 6 小时整点跑一次
    - cron: "0 */6 * * *"
  workflow_dispatch:

# 避免上一次还没跑完又开始下一次
concurrency:
  group: sync-upstream-6hourly
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-fork:
    name: Check upstream and sync fork
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.sync.outputs.updated }}
      branch: ${{ steps.sync.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect upstream and sync if needed
        id: sync
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          repo="$GITHUB_REPOSITORY"

          # 目标上游仓库（固定为指定仓库，而不是依赖 fork.parent）
          upstream_full="XyhTender/qq-farm-automation-bot"

          branch="$(gh api "repos/$repo" --jq '.default_branch')"

          # 使用上游默认分支（避免假设与 fork 默认分支同名）
          upstream_branch="$(gh api "repos/$upstream_full" --jq '.default_branch')"

          echo "Upstream: $upstream_full"
          echo "Target branch: $branch"
          echo "Upstream branch: $upstream_branch"

          # 注意：GitHub 的 merge-upstream API 只能同步仓库的 fork parent，
          # 不能指定任意上游仓库。因此这里改用 git remote 直接从指定 upstream 拉取并合并。

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 确保在分支上（schedule 触发通常是默认分支，但这里显式切过去更稳）
          git checkout "$branch"
          git pull --ff-only origin "$branch"

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "https://github.com/${upstream_full}.git"
          else
            git remote add upstream "https://github.com/${upstream_full}.git"
          fi

          git fetch --prune upstream "$upstream_branch"

          behind_by="$(git rev-list --count HEAD..upstream/$upstream_branch)"
          ahead_by="$(git rev-list --count upstream/$upstream_branch..HEAD)"

          echo "git compare: ahead_by=$ahead_by behind_by=$behind_by"

          if [ "$behind_by" -eq 0 ]; then
            echo "No upstream updates; skip."
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "branch=$branch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Upstream has new commits; merging..."
          git merge --no-edit "upstream/$upstream_branch"

          echo "Pushing to origin/$branch..."
          git push origin "HEAD:$branch"

          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

  prepare-tags:
    name: Prepare shared tags
    runs-on: ubuntu-latest
    needs: sync-fork
    if: needs.sync-fork.outputs.updated == 'true'
    outputs:
      release_date: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync-fork.outputs.branch }}

      - name: Read release date tag from Update.log first line
        id: tag
        run: |
          first_line="$(sed -n '1p' Update.log | tr -d '\r')"
          date_raw="$(echo "$first_line" | grep -oE '[0-9]{4}/[0-9]{2}/[0-9]{2}' | head -n 1)"

          if [ -z "$date_raw" ]; then
            echo "Could not find date like YYYY/MM/DD in Update.log line 1"
            exit 1
          fi

          # Docker tags cannot contain '/'; convert to YYYY-MM-DD.
          date_tag="${date_raw//\//-}"
          echo "value=$date_tag" >> "$GITHUB_OUTPUT"

  docker-amd64:
    name: Build Docker linux/amd64
    runs-on: ubuntu-latest
    needs:
      - sync-fork
      - prepare-tags
    if: needs.prepare-tags.result == 'success'
    permissions:
      contents: read

    env:
      REGISTRY: docker.io
      IMAGE_NAME: ldqs365/qq-farm-automation-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync-fork.outputs.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./core/Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export amd64 digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" | sed 's/^sha256://' > /tmp/digests/amd64

      - name: Upload amd64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-amd64
          path: /tmp/digests/amd64
          if-no-files-found: error
          retention-days: 1

  docker-arm64:
    name: Build Docker linux/arm64
    runs-on: ubuntu-24.04-arm
    needs:
      - sync-fork
      - prepare-tags
    if: needs.prepare-tags.result == 'success'
    permissions:
      contents: read

    env:
      REGISTRY: docker.io
      IMAGE_NAME: ldqs365/qq-farm-automation-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync-fork.outputs.branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./core/Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export arm64 digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" | sed 's/^sha256://' > /tmp/digests/arm64

      - name: Upload arm64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-arm64
          path: /tmp/digests/arm64
          if-no-files-found: error
          retention-days: 1

  docker-armv7:
    name: Build Docker linux/arm/v7
    runs-on: ubuntu-latest
    needs:
      - sync-fork
      - prepare-tags
    if: needs.prepare-tags.result == 'success'
    permissions:
      contents: read

    env:
      REGISTRY: docker.io
      IMAGE_NAME: ldqs365/qq-farm-automation-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync-fork.outputs.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./core/Dockerfile
          platforms: linux/arm/v7
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export armv7 digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" | sed 's/^sha256://' > /tmp/digests/armv7

      - name: Upload armv7 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-armv7
          path: /tmp/digests/armv7
          if-no-files-found: error
          retention-days: 1

  publish-manifests:
    name: Publish Docker manifests (Linux)
    runs-on: ubuntu-latest
    needs:
      - prepare-tags
      - docker-amd64
      - docker-arm64
      - docker-armv7
    if: needs.prepare-tags.result == 'success'
    permissions:
      contents: read

    env:
      REGISTRY: docker.io
      IMAGE_NAME: ldqs365/qq-farm-automation-bot

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Publish latest and release-date manifests from digests
        run: |
          sources=""
          for f in /tmp/digests/*; do
            d="sha256:$(cat "$f")"
            sources="$sources ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$d"
          done

          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-tags.outputs.release_date }} \
            $sources

      - name: Inspect latest manifest
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Inspect release-date manifest
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-tags.outputs.release_date }}
